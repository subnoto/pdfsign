name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Install pdfcpu
        run: go install github.com/pdfcpu/pdfcpu/cmd/pdfcpu@latest

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run signed PDF validation (pdfcpu + pdfsign)
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          chmod +x scripts/validate-signed.sh scripts/dss_validate.py
          ./scripts/validate-signed.sh

      - name: DSS PAdES validation (ETSI via EU DSS)
        run: |
          chmod +x scripts/validate-signed.sh scripts/dss_validate.py
          docker pull ghcr.io/vysmaty/dockerized-dss:latest
          ./scripts/validate-signed.sh --skip-pdfcpu --skip-verify --with-dss-docker --dss

      - name: Upload coverage report
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.txt
          flags: unittests
          name: codecov-umbrella

      - name: Upload test PDF files
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-pdf-artifacts
          path: testfiles/success/
          retention-days: 7
